let engNode=null,engGain=null;
function startEngine(){
  if(!audioCtx||engNode)return;
  engGain=audioCtx.createGain();engGain.gain.value=0;engGain.connect(audioCtx.destination);
  const osc=audioCtx.createOscillator();osc.type='sawtooth';osc.frequency.value=52;
  const lfo=audioCtx.createOscillator();lfo.frequency.value=9;
  const lfoG=audioCtx.createGain();lfoG.gain.value=10;
  lfo.connect(lfoG);lfoG.connect(osc.frequency);
  const filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=220;
  osc.connect(filt);filt.connect(engGain);
  osc.start();lfo.start();engNode=osc;
}
function updateEngine(n){

  const vol=n>0?0.5*Math.min(n,3)/3:0;
  engGain.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+0.25);
}
let engineNode=null,engineGain=null,engineLfo=null;
function startEngine(){
  if(!audioCtx||engineNode)return;
  engineGain=audioCtx.createGain();engineGain.gain.setValueAtTime(0,audioCtx.currentTime);
  engineGain.connect(audioCtx.destination);
  // Ana motor sesi - düşük frekanslı oscillator

  engineNode.connect(engineGain);engineNode.start();

}

async function _loadShot(){

  }catch(e){}
}

  const g=audioCtx.createGain();g.gain.value=Math.max(0,Math.min(1,vol));
  src.connect(g);g.connect(audioCtx.destination);

      if(resources>=50){resources-=50;factory.buildQueue.push('soldier');flashStatus('🪖 Asker sıraya eklendi ('+factory.buildQueue.length+')');}
      else flashStatus('Yetersiz kaynak! (50 gerek)');
    };
    const bC=document.getElementById('bCh47');
    if(bC)bC.onclick=()=>{
      if(resources>=300){resources-=300;factory.buildQueue.push('chinook');flashStatus('🚁 CH-47 sıraya eklendi ('+factory.buildQueue.length+')');}
      else flashStatus('Yetersiz kaynak! (300 gerek)');
    };
    const bBr=document.getElementById('bBrad');
    if(bBr)bBr.onclick=()=>{
      if(resources>=BRAD_COST){resources-=BRAD_COST;factory.buildQueue.push('bradley');flashStatus('🚛 Bradley sıraya eklendi ('+factory.buildQueue.length+')');}
      else flashStatus('Yetersiz kaynak! ('+BRAD_COST+' gerek)');
    };
    const bStr=document.getElementById('bStr');
    if(bStr)bStr.onclick=()=>{
      if(resources>=STR_COST){resources-=STR_COST;factory.buildQueue.push('stryker');flashStatus('🛡 Stryker sıraya eklendi ('+factory.buildQueue.length+')');}
      else flashStatus('Yetersiz kaynak! ('+STR_COST+' gerek)');
    };
    const bD=document.getElementById('bDeploy');
    if(bD)bD.onclick=()=>{
      let total=0;
      tanks.forEach(ch=>{
        if(!ch.alive||ch.unitType!=='chinook'||ch.team!=='player'||!ch.selected)return;
        // kargodaki birimleri CH-47'nin yanına indir
        while(ch.cargo.length>0){
          const c=ch.cargo.pop();
          const ang=Math.random()*Math.PI*2;const r=60+Math.random()*40;
          const ux=ch.x+Math.cos(ang)*r, uy=ch.y+Math.sin(ang)*r;
          let nu;
          if(c.type==='tank')nu=makeTank(ux,uy,'player');
          else if(c.type==='soldier')nu=makeSoldier(ux,uy,'player');
          else continue;
          nu.hp=c.hp;nu.maxHp=c.maxHp;
          tanks.push(nu);total++;
        }
      });
      if(total>0)flashStatus('📦 '+total+' birim indirildi');
      else flashStatus('İndirilecek birim yok');
    };
  }
  // KONTROL BUTONLARI
  const bPause=document.getElementById('bPause'),bAll=document.getElementById('bAll'),bStop=document.getElementById('bStop');
  const overlay=document.getElementById('pauseOverlay'),bResume=document.getElementById('bResume');
  if(bPause){
    bPause.onclick=()=>{
      paused=true;overlay.classList.add('show');
      // tüm sesleri kesin sustur
      try{if(typeof engineSnd!=='undefined'){engineSnd.volume=0;engineSnd.pause();}}catch(e){}
      try{if(heliGain){heliGain.gain.value=0;}if(heliOsc){heliOsc.disconnect();}}catch(e){}
      try{if(audioCtx&&audioCtx.state==='running')audioCtx.suspend();}catch(e){}
    };
    if(bResume)bResume.onclick=()=>{
      paused=false;overlay.classList.remove('show');
      try{if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}catch(e){}
      try{if(typeof engineSnd!=='undefined')engineSnd.play().catch(()=>{});}catch(e){}
      try{if(heliOsc&&heliGain){heliOsc.connect(heliGain);}}catch(e){} // heli sesini geri bağla
    };
    if(overlay)overlay.onclick=(e)=>{if(e.target===overlay){paused=false;overlay.classList.remove('show');try{if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}catch(e2){}try{if(typeof engineSnd!=='undefined')engineSnd.play().catch(()=>{});}catch(e2){}try{if(heliOsc&&heliGain)heliOsc.connect(heliGain);}catch(e2){}}};
  }
  if(bAll){bAll.onclick=()=>{ // tüm oyuncu birimlerini seç
    let c=0;tanks.forEach(t=>{if(t.alive&&t.team==='player'){t.selected=true;c++;}else t.selected=false;});
    factory.selected=false;if(c)flashStatus('⊕ '+c+' birim seçildi');
  };}
  if(bStop){bStop.onclick=()=>{ // seçili birimleri durdur VE seçimi iptal et
    let c=0;tanks.forEach(t=>{if(t.selected&&t.alive){t.tx=t.x;t.ty=t.y;t.focusTarget=null;t.hasOrder=false;t.homeX=t.x;t.homeY=t.y;c++;}t.selected=false;});
    factory.selected=false;
    if(c)flashStatus('⊗ '+c+' birim durduruldu ve seçim iptal');
  };}
});

        // kenar bolgesi (komsuya dogru yarim hucre)
        let rx=ox,ry=oy,rw=CELL,rh=CELL;
        let gx0,gy0,gx1,gy1;
        const OV=CELL*0.6; // tasma miktari
        if(dx===1){rx=ox+CELL-2;rw=OV;gx0=ox+CELL;gy0=oy;gx1=ox+CELL+OV;gy1=oy;}
        else if(dx===-1){rx=ox-OV+2;rw=OV;gx0=ox;gy0=oy;gx1=ox-OV;gy1=oy;}
        else if(dy===1){ry=oy+CELL-2;rh=OV;gx0=ox;gy0=oy+CELL;gx1=ox;gy1=oy+CELL+OV;}
        else {ry=oy-OV+2;rh=OV;gx0=ox;gy0=oy;gx1=ox;gy1=oy-OV;}
        c.beginPath();c.rect(Math.min(rx,rx+rw)-1,Math.min(ry,ry+rh)-1,Math.abs(rw)+2+(dx?0:CELL),Math.abs(rh)+2+(dy?0:CELL));
        // dogru dikdortgen
        c.restore();
        c.save();
        if(dx!==0){c.rect(dx===1?ox+CELL-2:ox-OV+2,oy,OV,CELL);}
        else{c.rect(ox,dy===1?oy+CELL-2:oy-OV+2,CELL,OV);}
        c.clip();
        const grad=c.createLinearGradient(gx0,gy0,gx1,gy1);
        grad.addColorStop(0,'rgba(255,255,255,0.85)');
        grad.addColorStop(1,'rgba(255,255,255,0)');
        c.globalAlpha=1;
        // dokuyu cizip alpha maskele: once doku, sonra destination-in ile gradient
        c.fillStyle=pat[tn];
        if(dx!==0)c.fillRect(dx===1?ox+CELL-2:ox-OV+2,oy,OV,CELL);
        else c.fillRect(ox,dy===1?oy+CELL-2:oy-OV+2,CELL,OV);
        c.globalCompositeOperation='destination-in';
        c.fillStyle=grad;
        if(dx!==0)c.fillRect(dx===1?ox+CELL-2:ox-OV+2,oy,OV,CELL);
        else c.fillRect(ox,dy===1?oy+CELL-2:oy-OV+2,CELL,OV);
        c.restore();
      }
    }
  }
  islandTerrainCanvas=cv;
  return true;
}

const SHADOW_DX=8, SHADOW_DY=6; // gölge birime yakın (yere oturmuş hissi)
const SHADOW_ALPHA=0.55;
// Görseli silüet (siyah dolu) olarak çiz - canvas filter ile
function drawShadowSprite(img,dx,dy,w,h,angle,centerOffsetX,centerOffsetY){
  if(!img||!img.complete)return;
  centerOffsetX=centerOffsetX||0;centerOffsetY=centerOffsetY||0;
  ctx.save();
  ctx.globalAlpha=SHADOW_ALPHA;
  ctx.translate(dx+SHADOW_DX,dy+SHADOW_DY);
  if(angle)ctx.rotate(angle);
  // CSS filter ile siyah silüet: brightness 0 + saturation 0 (sadece alpha kalır)
  ctx.filter='brightness(0)';
  // gölge hafif küçük (yere oturmuş hissi, %92)
  const gs=0.92;
  ctx.drawImage(img,(-w/2+centerOffsetX)*gs,(-h/2+centerOffsetY)*gs,w*gs,h*gs);
  ctx.filter='none';
  ctx.restore();
}

function drawSelectBrackets(cx,cy,halfW,halfH){
  const z=cam.zoom;
  const len=Math.min(halfW,halfH)*0.45; // köşe çizgi uzunluğu
  const lw=2.5*z;
  ctx.save();
  ctx.strokeStyle='#8effa8';ctx.lineWidth=lw;ctx.lineCap='round';
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=2*z;
  const L=cx-halfW, R=cx+halfW, T=cy-halfH, B=cy+halfH;
  ctx.beginPath();
  // Sol üst
  ctx.moveTo(L,T+len);ctx.lineTo(L,T);ctx.lineTo(L+len,T);
  // Sağ üst
  ctx.moveTo(R-len,T);ctx.lineTo(R,T);ctx.lineTo(R,T+len);
  // Sol alt
  ctx.moveTo(L,B-len);ctx.lineTo(L,B);ctx.lineTo(L+len,B);
  // Sağ alt
  ctx.moveTo(R-len,B);ctx.lineTo(R,B);ctx.lineTo(R,B-len);
  ctx.stroke();
  ctx.restore();
}

canvas.addEventListener('pointermove',e=>{

  if(pointers.size===2&&pinchStart){const p=[...pointers.values()];const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);const mid={x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2};cam.zoom=Math.max(0.25,Math.min(1.8,pinchStart.zoom*(d/pinchStart.d)));if(pinchStart.mid){cam.x+=(pinchStart.mid.x-mid.x)/cam.zoom;cam.y+=(pinchStart.mid.y-mid.y)/cam.zoom;}pinchStart.mid=mid;clampCam();didDrag=true;}
  else if(pointers.size===1&&dragStart){

          let ax=0,ay=0;sel.forEach(t=>{ax+=t.x;ay+=t.y;});ax/=n;ay/=n;
          const faceDir=Math.atan2(wy-ay,wx-ax);
          sel.forEach(t=>{
            let best=-1,bd=1e9;
            for(let s=0;s<n;s++){if(used[s])continue;const dd=Math.hypot(slots[s].x-t.x,slots[s].y-t.y);if(dd<bd){bd=dd;best=s;}}
            used[best]=true;
            t.tx=slots[best].x;t.ty=slots[best].y;t.hasOrder=true;t.focusTarget=null;t.homeX=t.tx;t.homeY=t.ty;t.faceDir=faceDir;
          });waves.push({x:wx,y:wy,r:4,life:1});}}
      }
    }
  }
  dragStart=null;selBox=null;selectMode=false;
});

function nearestEnemy(t){let b=null,bd=Infinity;for(const o of tanks){if(!o.alive||o.team===t.team)continue;if(o.hp-o.incomingDmg<=0)continue;const d=dist(t.x,t.y,o.x,o.y);if(d<bd){bd=d;b=o;}}if(!b){for(const o of tanks){if(!o.alive||o.team===t.team)continue;const d=dist(t.x,t.y,o.x,o.y);if(d<bd){bd=d;b=o;}}}return {e:b,d:bd};}

function update(){
  if(paused)return;
  time++;if(statusFlashT>0)statusFlashT--;resources+=0.12;
  // KIŞLA üretimi
  if(factory.buildQueue.length>0){
    factory.buildTimer++;
    const curType=factory.buildQueue[0];
    const buildTime=curType==='chinook'?360:curType==='heli'?240:curType==='soldier'?90:curType==='bradley'?200:curType==='stryker'?190:180;
    if(factory.buildTimer>=buildTime){
      factory.buildTimer=0;factory.buildQueue.shift();
      const nt=curType==='chinook'?makeChinook(factory.x,factory.y+factory.h/2+50,'player'):curType==='heli'?makeHeli(factory.x,factory.y+factory.h/2+40,'player'):curType==='soldier'?makeSoldier(factory.x,factory.y+factory.h/2+25,'player'):curType==='bradley'?makeBradley(factory.x,factory.y+factory.h/2+35,'player'):curType==='stryker'?makeStryker(factory.x,factory.y+factory.h/2+35,'player'):makeTank(factory.x,factory.y+factory.h/2+30,'player');
      nt.spawning=30;nt.tx=factory.rallyX;nt.ty=factory.rallyY;nt.hasOrder=true;
      tanks.push(nt);burst(nt.x,nt.y,'#7fff9f',16,4);
    }
  }
  for(const t of tanks)t.incomingDmg=0;
  for(const b of bullets){let best=null,bd=999;for(const t of tanks){if(t.alive&&t.team!==b.team){const d=dist(b.x,b.y,t.x,t.y);if(d<bd&&d<60){bd=d;best=t;}}}if(best)best.incomingDmg+=b.dmg;}
  // düşman kışlası tank üretir
  // DALGA HALİNDE SALDIRI: yeterli birim biriktiyse toplu saldır
  enemyFactory.waveSize=enemyFactory.waveSize||4; // ilk dalga icin minimum birim
  const reserves=tanks.filter(t=>t.alive&&t.team==='enemy'&&!t.focusTarget&&!t.hasOrder);
  if(reserves.length>=enemyFactory.waveSize){
    // DALGA BAŞLA: hepsini TOPLU halde oyuncu ussune yolla (izgara formasyon)
    const n=reserves.length;const cols=Math.ceil(Math.sqrt(n));const sp=STATS.radius*2.6;
    const baseX=factory.x, baseY=factory.y+factory.h/2+100;
    reserves.forEach((t,i)=>{
      const col=i%cols, row=Math.floor(i/cols);
      t.tx=baseX+(col-(cols-1)/2)*sp;
      t.ty=baseY+(row-(cols-1)/2)*sp;
      t.homeX=t.tx;t.homeY=t.ty; // saldiri sirasinda ev = hedef
      t.hasOrder=true;
    });
    flashStatus('⚔️ Düşman dalgası saldırıyor! ('+n+' birim)');
    enemyFactory.waveSize=Math.min(18,enemyFactory.waveSize+2); // sonraki dalga daha buyuk
  }
  enemyFactory.resources+=0.35; // düşman kaynak geliri (combined arms için yeterli)
  enemyFactory.spawnTimer++;
  if(enemyFactory.spawnTimer>=150 && enemyFactory.resources>=50){
    // RASTGELE birim seç: tank/bradley/stryker/heli/asker (combined arms)
    const roll=Math.random();let cost,maker;
    if(roll<0.35){cost=100;maker=makeTank;}
    else if(roll<0.52){cost=BRAD_COST;maker=makeBradley;}
    else if(roll<0.68){cost=STR_COST;maker=makeStryker;}
    else if(roll<0.84){cost=150;maker=makeHeli;}
    else {cost=50;maker=makeSoldier;}
    // kaynak yetmiyorsa daha ucuz birime dus (bos tur atmasin)
    if(enemyFactory.resources<cost){
      if(enemyFactory.resources>=100){cost=100;maker=makeTank;}
      else if(enemyFactory.resources>=50){cost=50;maker=makeSoldier;}
      else {maker=null;} // hic kaynak yok, bekle
    }
    if(maker && enemyFactory.resources>=cost){
      enemyFactory.spawnTimer=0; enemyFactory.resources-=cost;
      const nt=maker(enemyFactory.x,enemyFactory.y-enemyFactory.h/2-40,'enemy');
      // BİRİKİM: kışlanın yanında bekle (saldırı emri gelene kadar)
      const rallyX=enemyFactory.x+(Math.random()-0.5)*200;
      const rallyY=enemyFactory.y-enemyFactory.h/2-100+(Math.random()-0.5)*100;
      nt.tx=rallyX;nt.ty=rallyY;nt.homeX=rallyX;nt.homeY=rallyY;
      nt.hasOrder=false; // birikimde, otonom davranır
      tanks.push(nt);
    }
  }
  const enemyAlive=tanks.filter(t=>t.alive&&t.team==='enemy').length;
  waveTimer--;
  // dalga sistemi kaldırıldı - düşman artık kışladan üretiyor
  if(enemyAlive===0&&waveNum===0){spawnEnemyWave(2);}
  for(const t of tanks){
    if(!t.alive){if(t.deadTimer===0)wrecks.push({x:t.x,y:t.y,a:t.hullAngle,fade:1,unitType:t.unitType,team:t.team});t.deadTimer++;t.smokeTimer++;if(t.deadTimer<120&&t.smokeTimer%6===0)smoke(t.x+(Math.random()-0.5)*18,t.y-8,true);continue;}
    if(t.spawning>0)t.spawning--;
    t.idlePhase+=0.04;
    // KARA birimleri icin: hareket oncesi konumu sakla (suya girerse geri al)
    if(t.unitType!=='heli'&&t.unitType!=='chinook'){t._px=t.x;t._py=t.y;}
    // FOCUS TARGET: kilitli hedef geçerliyse onu kullan (namlu titreme çözümü)
    let tg,td;
    if(t.focusTarget && t.focusTarget.alive){
      tg=t.focusTarget; td=dist(t.x,t.y,tg.x,tg.y);
    } else {
      t.focusTarget=null;
      const ne=nearestEnemy(t); tg=ne.e; td=ne.d;
    }
    if(t.team==='enemy'){
      if(t.hasOrder){
        // DALGA EMRI VAR: hedefe saldir (focusTarget veya en yakin dusman)
        if(tg){if(td>STATS.range*0.82){t.tx=tg.x;t.ty=tg.y;}else{t.tx=t.x;t.ty=t.y;}}
      } else {
        // BEKLEMEDE (rally): sadece cok yakin dusman varsa savun, yoksa bekle
        const defendRange=(t.unitType==='heli'?(t.range||420):((t.unitType==='bradley'||t.unitType==='stryker')?t.range:STATS.range))*0.9;
        const homeDist=Math.hypot(t.x-t.homeX,t.y-t.homeY);
        if(tg && td<=defendRange && homeDist<150){
          if(td>defendRange*0.85){t.tx=tg.x;t.ty=tg.y;}else{t.tx=t.x;t.ty=t.y;}
        } else {
          // rally noktasinda bekle
          if(homeDist>30){t.tx=t.homeX;t.ty=t.homeY;}else{t.tx=t.x;t.ty=t.y;}
        }
      }
    }
    else{
      // Düşmanı belli mesafeye kadar takip eder, leash dışına çıkmaz, sonra eve döner
      const myRange=t.unitType==='heli'?(t.range||420):(t.range||STATS.range);
      const detectRange=myRange*1.5; // algı
      const leashRange=420; // birimin homeX/homeY'den uzaklaşabileceği maks mesafe
      const homeDist=Math.hypot(t.x-t.homeX,t.y-t.homeY);
      if(t.focusTarget&&t.focusTarget.alive){
        // manuel saldırı emri kutsaldır - leash umursamaz
        if(td>myRange*0.85){t.tx=t.focusTarget.x;t.ty=t.focusTarget.y;}else{t.tx=t.x;t.ty=t.y;}
      } else if(!t.hasOrder){
        // Defensive: düşman yakında VE ben leash içindeysem savaşa git
        if(tg && td<=detectRange && homeDist<leashRange){
          if(td<=myRange*0.85){t.tx=t.x;t.ty=t.y;}
          else{t.tx=tg.x;t.ty=tg.y;}
        } else {
          // Düşman yok VEYA leash'i geçtim -> EVE DÖN
          if(homeDist>30){t.tx=t.homeX;t.ty=t.homeY;t.focusTarget=null;} else {t.tx=t.x;t.ty=t.y;}
        }
      }
    }
    // ENGEL KAÇINMA (obstacle listesi boşsa etkisiz)
    let gx=t.tx, gy=t.ty;
    if(t.unitType!=='heli'&&t.unitType!=='chinook'&&t.hasOrder){
      let ax=0,ay=0;
      for(const o of obstacles){
        const odx=t.x-o.x, ody=t.y-o.y, od=Math.hypot(odx,ody);
        const danger=o.r+STATS.radius+60;
        if(od<danger && od>0.1){
          const force=(danger-od)/danger;
          ax+=(odx/od)*force; ay+=(ody/od)*force;
        }
      }
      gx=t.tx+ax*120; gy=t.ty+ay*120;
    }
    const dx=gx-t.x,dy=gy-t.y,dd=Math.hypot(dx,dy);
    if(t.unitType==='chinook'){
      // CH-47 CHINOOK: silahsız nakliye, durunca yere iner
      t.rotorAngle+=t.rotorSpeed; t.rotor2Angle-=t.rotorSpeed;
      t.bobPhase+=t.altitude>5?0.05:0; // havada bob, yerde dur
      const moving=dd>t.speed+8;
      if(moving){
        // KALKIŞ: havalan
        t.targetAltitude=100;
        t.rotorSpeed+=(1.8-t.rotorSpeed)*0.05; // hızlanan rotor (havada)
        if(t.altitude>30){ // havadayken hareket et
          const targetH=Math.atan2(dy,dx);
          const diff=angleDiff(targetH,t.hullAngle);
          t.hullAngle+=Math.sign(diff)*Math.min(Math.abs(diff),0.07);
          if(Math.abs(diff)<0.7){
            t.x+=Math.cos(t.hullAngle)*t.speed;
            t.y+=Math.sin(t.hullAngle)*t.speed;
          }
        }
      } else {
        // İNİŞ: durunca yere in
        t.hasOrder=false;
        t.targetAltitude=0;
        if(t.altitude<=2)t.rotorSpeed+=(0.25-t.rotorSpeed)*0.03; // yerde rotor yavaşlar
        else t.rotorSpeed+=(1.8-t.rotorSpeed)*0.05;
        if(t.faceDir!==undefined){
          const fd=angleDiff(t.faceDir,t.hullAngle);
          if(Math.abs(fd)>0.02)t.hullAngle+=Math.sign(fd)*Math.min(Math.abs(fd),0.08);
        }
      }
      // Yumuşak yükselme/iniş
      t.altitude+=(t.targetAltitude-t.altitude)*0.025;
    } else if(t.unitType==='soldier'){
      // ASKER (piyade): animasyonlu (yürüme/ateş/ölme)
      const moving=dd>t.speed+1;
      // animTimer hep artar (animasyon hızı)
      t.animTimer=(t.animTimer||0)+1;
      // shoot state ise: 4 kare oynat, sonra walk veya idle'a dön
      if(t.animState==='shoot'){
        if(t.animTimer>=4){t.animTimer=0;t.animFrame++;if(t.animFrame>=4){t.animState=moving?'walk':'idle';t.animFrame=0;}}
        // ateş ederken döner ama hareket etmez
        if(tg){const tt=Math.atan2(tg.y-t.y,tg.x-t.x);t.hullAngle=tt;}
      } else if(moving){
        // yürüme: yöne göre animFrame ilerlet
        const targetH=Math.atan2(dy,dx);
        t.hullAngle=targetH;
        t.x+=Math.cos(targetH)*t.speed;
        t.y+=Math.sin(targetH)*t.speed;
        t.animState='walk';
        if(t.animTimer>=4){t.animTimer=0;t.animFrame=(t.animFrame+1)%8;}
      } else {
        t.hasOrder=false;
        t.animState='idle';t.animFrame=0;
        if(tg&&td<=t.range){t.hullAngle=Math.atan2(tg.y-t.y,tg.x-t.x);}
        else if(t.faceDir!==undefined){t.hullAngle=t.faceDir;}
      }
    } else if(t.unitType==='heli'){
      // HELİKOPTER: hızlı, çevik, kış izi yok, pervane döner, havada salınır
      t.rotorAngle+=0.45; // gerçekçi pervane hızı
      t.bobPhase+=0.06;  // havada salınım
      const moving=dd>t.speed+8; // hedefe yaklaşınca tam dur (titreme yok)
      if(moving){
        const targetH=Math.atan2(dy,dx);const diff=angleDiff(targetH,t.hullAngle);
        t.hullAngle+=Math.sign(diff)*Math.min(Math.abs(diff),0.08);
        if(Math.abs(diff)<0.6){t.x+=Math.cos(t.hullAngle)*t.speed;t.y+=Math.sin(t.hullAngle)*t.speed;}
      }else if(t.faceDir!==undefined && (!tg||td>(t.range||420))){
        // DURURKEN düşman yok: belirlenen yöne dön (hepsi aynı yöne bakar)
        const diff=angleDiff(t.faceDir,t.hullAngle);
        if(Math.abs(diff)>0.02)t.hullAngle+=Math.sign(diff)*Math.min(Math.abs(diff),0.08);
      }else if(tg&&td<=(t.range||420)){
        // DURURKEN düşman menzildeyse gövdeyi ona çevir (ateş edebilmek için)
        const targetH=Math.atan2(tg.y-t.y,tg.x-t.x);const diff=angleDiff(targetH,t.hullAngle);
        t.hullAngle+=Math.sign(diff)*Math.min(Math.abs(diff),0.06);

    } else if(t.unitType==='stryker'){
      // STRYKER: tekerlekli, hizli ve cevik APC

        const targetH=Math.atan2(dy,dx);const diff=angleDiff(targetH,t.hullAngle);
        const maxV=Math.min(0.07,Math.abs(diff)*0.5+0.01);const desired=Math.sign(diff)*maxV;
        t.hullTurnVel+=(desired-t.hullTurnVel)*0.28;

        if(Math.abs(diff)<0.25){t.x+=Math.cos(t.hullAngle)*t.speed;t.y+=Math.sin(t.hullAngle)*t.speed;t.trackPhase+=0.3;if(time%6===0)tracks.push({x:t.x,y:t.y,a:t.hullAngle,life:1});}

    }

      }
    } else if(tg && t.unitType==='heli'){

    } else if(tg && t.unitType==='bradley'){

      const bx=t.x+Math.cos(t.turretAngle)*bl, by=t.y+Math.sin(t.turretAngle)*bl;
      // 25mm TOP: orta menzil, alan hasari
      if(aligned&&td<=t.range&&t.fire25CD<=0&&t.spawning<=0){
        const t01=Math.min(1,td/t.range);const acc=0.92-0.4*t01;const willHit=Math.random()<acc;

        bullets.push({x:bx,y:by,vx:Math.cos(aimAng)*12,vy:Math.sin(aimAng)*12,team:t.team,dmg:t.dmg,life:120,willHit,kind:'25mm'});
        t.fire25CD=t.fireRate;t.cannonRecoil=8;t.flash25=6;t.flash25Frame=0;
        const camCX=cam.x+VW/cam.zoom/2,camCY=cam.y+VH/cam.zoom/2;
        const sd=dist(t.x,t.y,camCX,camCY);const vol=Math.max(0,1-sd/800);

      }

function drawHullTurret(sx,sy,hullAngle,turretAngle,opts){
  const z=cam.zoom;
  const enemy=opts.team==='enemy';
  const hImg=enemy?eHullImg:hullImg, tImg=enemy?eTurImg:turretImg;
  const HWv=enemy?EHULL_W:HULL_W,HHv=enemy?EHULL_H:HULL_H,TWv=enemy?ETUR_W:TUR_W,THv=enemy?ETUR_H:TUR_H;
  const tpx=enemy?ETPX:TPX, tpy=enemy?ETPY:TPY;
  const hw=HWv*SCALE*z,hh=HHv*SCALE*z;
  const tw=TWv*SCALE*z,th=THv*SCALE*z;
  const dark=opts.dark||false,recoil=(opts.recoil||0)*z,idle=opts.idle||0,muzzle=opts.muzzle||0,alpha=opts.alpha!==undefined?opts.alpha:1;
  // Tank silüet gölgesi (gövde + kule birlikte)
  drawShadowSprite(hImg,sx,sy,hw,hh,hullAngle+Math.PI/2);
  drawShadowSprite(tImg,sx,sy,tw,th,turretAngle+Math.PI/2);
  ctx.save();ctx.translate(sx,sy);
  ctx.globalAlpha=alpha;
  ctx.save();ctx.rotate(hullAngle+Math.PI/2);ctx.translate(0,idle);
  if(dark)ctx.filter='brightness(0.3) saturate(0.4)';
  if(hImg.complete)ctx.drawImage(hImg,-hw/2,-hh/2,hw,hh);
  ctx.filter='none';
  // palet hareketi görselde zaten var, üst çizgi kaldırıldı
  ctx.restore();
  ctx.save();ctx.rotate(turretAngle+Math.PI/2);ctx.translate(0,idle);
  const offX=(0.5-tpx)*tw,offY=(0.5-tpy)*th;
  if(dark)ctx.filter='brightness(0.3) saturate(0.4)';
  if(tImg.complete)ctx.drawImage(tImg,-tw/2+offX,-th/2+offY-recoil,tw,th);
  ctx.filter='none';
  // eski muzzle parlaması kaldırıldı - artık muzzleFlash parçacık sistemi var
  ctx.restore();
  ctx.globalAlpha=1;ctx.restore();
}
function drawSoldier(t){

  else if(grp==='shoot'){frames=sldImgs.shoot;}
  else if(grp==='walk'){frames=sldImgs[dirGrp];}
  else{frames=sldImgs[dirGrp]||sldImgs.idle;}
  if(!frames||frames.length===0)return;
  const fi=Math.floor(t.animFrame)%frames.length;
  const img=frames[fi];
  if(!img||!img.complete)return;
  
  const sw=img.width*SCALE*1.7*z, sh=img.height*SCALE*1.7*z;
  const alpha=t.spawning>0?(0.4+0.6*(1-t.spawning/30)):1;

  ctx.save();
  ctx.globalAlpha=alpha*0.32;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(sx+4*z, sy+sh*0.36, sw*0.26, sw*0.11, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // asker
  ctx.save();ctx.globalAlpha=alpha;
  if(flipX){ctx.translate(sx,sy);ctx.scale(-1,1);ctx.drawImage(img,-sw/2,-sh/2,sw,sh);}
  else{ctx.drawImage(img,sx-sw/2,sy-sh/2,sw,sh);}

  // seçim halkası
  if(t.selected){drawSelectBrackets(sx,sy,sw*0.5,sh*0.5);}

function drawHeli(t){

  const bob=Math.sin(t.bobPhase)*3.5*z; // havada salınım (belirgin)
  const shadowScale=1+Math.sin(t.bobPhase)*0.05; // gölge nabzı (yükseklik hissi)
  const alpha=t.spawning>0?(0.4+0.6*(1-t.spawning/30)):1;
  // Apache silüet gölgesi (uçuş yüksekliği kadar kayık)
  ctx.save();ctx.globalAlpha=alpha*0.5;
  ctx.translate(sx+hw*0.4,sy+hh*0.45); // havada olduğu için daha kayık
  ctx.rotate(t.hullAngle+Math.PI/2);
  ctx.filter='brightness(0)';
  if(heliImg.complete)ctx.drawImage(heliImg,-hw/2,-hh/2,hw,hh);
  // Apache pervane gölgesi (göbekte, dönen)
  {const hubX=(HUB_X-0.5)*hw, hubY=(HUB_Y-0.5)*hh;
   if(rotorImg.complete){ctx.save();ctx.translate(hubX,hubY);ctx.rotate(t.rotorAngle);ctx.drawImage(rotorImg,-rw/2,-rh/2,rw,rh);ctx.restore();}}
  ctx.filter='none';ctx.restore();
  // 2) GÖVDE (yukarıda)
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(sx,sy-fly+bob);ctx.rotate(t.hullAngle+Math.PI/2);
  if(heliImg.complete)ctx.drawImage(heliImg,-hw/2,-hh/2,hw,hh);
  // muzzle flash (burun silahı)
  // heli eski muzzle kaldırıldı (muzzleFlash var)
  ctx.restore();
  // 3) ROTOR DİSKİ (hızlı dönüş hissi - hafif şeffaf daire)
  {const hubOffX=(HUB_X-0.5)*hw, hubOffY=(HUB_Y-0.5)*hh;
   ctx.save();ctx.globalAlpha=alpha*0.10;ctx.translate(sx,sy-fly+bob);ctx.rotate(t.hullAngle+Math.PI/2);ctx.translate(hubOffX,hubOffY);
   ctx.fillStyle='#888';ctx.beginPath();ctx.arc(0,0,rw*0.46,0,Math.PI*2);ctx.fill();ctx.restore();}
  // 4) DÖNEN PERVANE - motion blur ile gerçekçi
  {
    const hubOffX=(HUB_X-0.5)*hw, hubOffY=(HUB_Y-0.5)*hh;
    // Motion blur: 6 katman, her biri biraz döndürülmüş ve şeffaf
    const blurSteps=8;
    const blurAngle=Math.PI/4; // her adım arası açı
    for(let i=0;i<blurSteps;i++){
      const a2=alpha*(0.15-i*0.018); // önce daha opak, sona doğru şeffaf

    ctx.translate(sx,sy-fly+bob);ctx.rotate(t.hullAngle+Math.PI/2);ctx.translate(hubOffX,hubOffY);
    ctx.rotate(t.rotorAngle);

  if(t.selected){drawSelectBrackets(sx,sy-fly,hw*0.6,hh*0.55);}
  ctx.fillStyle=t.team==='player'?'#5cff7a':'#ff5c5c';ctx.beginPath();ctx.arc(sx,sy-fly-hh*0.5,3*z,0,Math.PI*2);ctx.fill();

function drawGroundDetails(){
  const z=cam.zoom;
  // PERFORMANS: zoom düşükse zemin detaylarını atla
  if(z<0.5)return;
  for(const d of groundDetails){
    const [sx,sy]=w2s(d.x,d.y);
    // ekran disi atla
    if(sx<-60||sx>VW+60||sy<-60||sy>VH+60)continue;
    ctx.save();
    ctx.translate(sx,sy);ctx.rotate(d.rot);
    if(d.kind==='patch'){
      // yumusak renk yamasi (acik veya koyu toprak)
      const r=(28+d.tone*40)*z;
      const dark=d.tone<0.5;
      const g=ctx.createRadialGradient(0,0,0,0,0,r);
      if(dark){g.addColorStop(0,`rgba(40,32,22,${d.a*0.6})`);g.addColorStop(1,'rgba(40,32,22,0)');}
      else{g.addColorStop(0,`rgba(120,100,72,${d.a*0.5})`);g.addColorStop(1,'rgba(120,100,72,0)');}
      ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,0,r,r*0.8,0,0,Math.PI*2);ctx.fill();
    } else if(d.kind==='gravel'){
      // kucuk cakil kumesi (3-5 nokta)
      const n=3+Math.floor(d.tone*3);
      for(let i=0;i<n;i++){
        const a=(i/n)*Math.PI*2+d.rot, dd=(3+d.tone*6)*z;
        const px=Math.cos(a)*dd, py=Math.sin(a)*dd;
        const sh=70+Math.floor(d.tone*40);
        ctx.fillStyle=`rgba(${sh},${sh-8},${sh-16},${d.a})`;
        ctx.beginPath();ctx.arc(px,py,(1.5+d.tone*2)*z*d.s,0,Math.PI*2);ctx.fill();
      }
    } else if(d.kind==='grass'){
      // ot tutami (birkac cizgi)
      ctx.strokeStyle=`rgba(${60+d.tone*30},${85+d.tone*40},${40+d.tone*20},${d.a})`;
      ctx.lineWidth=1.2*z;
      const bl=4+Math.floor(d.tone*4);
      for(let i=0;i<bl;i++){
        const a=-Math.PI/2+(i-bl/2)*0.25;
        const len=(5+d.tone*6)*z*d.s;
        ctx.beginPath();ctx.moveTo((i-bl/2)*2*z,0);ctx.lineTo((i-bl/2)*2*z+Math.cos(a)*len,Math.sin(a)*len);ctx.stroke();
      }
    } else { // crack (catlak/iz)
      ctx.strokeStyle=`rgba(25,20,14,${d.a*0.7})`;
      ctx.lineWidth=1.5*z*d.s;
      ctx.beginPath();
      const len=(20+d.tone*30)*z*d.s;
      ctx.moveTo(-len/2,0);
      ctx.lineTo(-len*0.1,(d.tone-0.5)*8*z);
      ctx.lineTo(len*0.3,(0.5-d.tone)*6*z);
      ctx.lineTo(len/2,0);
      ctx.stroke();
    }
    ctx.restore();
  }
}

    }
    // KATMAN 1 - temas gölgesi: binanın tam dibine oturan koyu, dar silüet (zemine gömme hissi)
    ctx.save();ctx.globalAlpha=0.40;ctx.filter='blur(3px)';
    ctx.drawImage(window._facShadow,sx-fw/2,sy-fh/2+fh*0.012,fw,fh);
    ctx.filter='none';ctx.restore();
    // KATMAN 2 - yön gölgesi: ışık soldan, gölge sağ-alta düşer
    const ox=fw*0.04, oy=fh*0.05;
    ctx.save();ctx.globalAlpha=0.28;ctx.drawImage(window._facShadow,sx-fw/2+ox,sy-fh/2+oy,fw,fh);ctx.restore();
  }
  if(facImg.complete){ctx.save();ctx.globalAlpha=1;ctx.globalCompositeOperation="source-over";ctx.drawImage(facImg,sx-fw/2,sy-fh/2,fw,fh);ctx.restore();}
  if(factory.selected){ctx.strokeStyle='#7fff9f';ctx.lineWidth=2;ctx.setLineDash([8,5]);ctx.strokeRect(sx-fw/2,sy-fh/2,fw,fh);ctx.setLineDash([]);
    // toplanma noktası çizgisi
    const [rx,ry]=w2s(factory.rallyX,factory.rallyY);ctx.strokeStyle='rgba(127,255,159,0.5)';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(rx,ry);ctx.stroke();ctx.fillStyle='#7fff9f';ctx.beginPath();ctx.arc(rx,ry,5*z,0,Math.PI*2);ctx.fill();
  }
  // üretim göstergesi
  if(factory.buildQueue.length>0){const ct=factory.buildQueue[0];const bt=ct==='heli'?240:180;const prog=factory.buildTimer/bt;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(sx-30*z,sy-fh/2-14*z,60*z,7*z);ctx.fillStyle='#cfffaf';ctx.fillRect(sx-30*z,sy-fh/2-14*z,60*z*prog,7*z);ctx.fillStyle='#cfffaf';ctx.font=`${11*z}px sans-serif`;ctx.textAlign='center';ctx.fillText((ct==='heli'?'🚁 ':'🔧 ')+factory.buildQueue.length,sx,sy-fh/2-18*z);}
}
function draw(){
  ctx.save();if(shake>0.2)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  const z=cam.zoom;
  // ZEMİN TEXTURE - iki katman blend (tekrar deseni gizlenir)
  // === KARO BAZLI HARİTA RENDER ===
  ctx.fillStyle='#1a4a6a';ctx.fillRect(0,0,VW,VH); // taban = derin su
  const cellW=islandCellW*z, cellH=islandCellH*z;
  const gx0=Math.max(0,Math.floor(cam.x/islandCellW)-1);
  const gy0=Math.max(0,Math.floor(cam.y/islandCellH)-1);
  const gx1=Math.min(ISLAND_GW,Math.ceil((cam.x+VW/z)/islandCellW)+1);
  const gy1=Math.min(ISLAND_GH,Math.ceil((cam.y+VH/z)/islandCellH)+1);
  for(let gy=gy0;gy<gy1;gy++){
    for(let gx=gx0;gx<gx1;gx++){
      const idx=D_GRID[gy*ISLAND_GW+gx];
      const img=tileImgs[idx];
      const [px,py]=w2s(gx*islandCellW,gy*islandCellH);
      if(img&&img.complete&&img.naturalWidth){
        ctx.drawImage(img,Math.floor(px),Math.floor(py),Math.ceil(cellW)+1,Math.ceil(cellH)+1);
      } else {
        ctx.fillStyle=idx===2?'#1a4a6a':'#5a7048';
        ctx.fillRect(Math.floor(px),Math.floor(py),Math.ceil(cellW)+1,Math.ceil(cellH)+1);
      }
    }
  }
    drawGroundDetails();
  // SU dalga parlamasi (animasyon)
  drawIslandWater();
  // ızgara kaldırıldı (texture zemin var)
  const [bx,by]=w2s(0,0);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=3;ctx.strokeRect(bx,by,MAP_W*z,MAP_H*z);
  for(const tr of tracks){const[x,y]=w2s(tr.x,tr.y);ctx.save();ctx.translate(x,y);ctx.rotate(tr.a+Math.PI/2);ctx.fillStyle=`rgba(20,18,12,${tr.life*0.22})`;ctx.fillRect(-18*z,-3*z,6*z,6*z);ctx.fillRect(12*z,-3*z,6*z,6*z);ctx.restore();}
  drawObstacles();
  drawFactory();
  // DÜŞMAN KIŞLASI
  {const [ex,ey]=w2s(enemyFactory.x,enemyFactory.y);const fw=FAC_W*FAC_SCALE*z,fh=FAC_H*FAC_SCALE*z;
   if(facImg.complete&&window._facShadow){
     ctx.save();ctx.globalAlpha=0.40;ctx.filter='blur(3px)';ctx.drawImage(window._facShadow,ex-fw/2,ey-fh/2+fh*0.012,fw,fh);ctx.filter='none';ctx.restore();
     const ox=fw*0.04,oy=fh*0.05;ctx.save();ctx.globalAlpha=0.28;ctx.drawImage(window._facShadow,ex-fw/2+ox,ey-fh/2+oy,fw,fh);ctx.restore();}
   if(facImg.complete){ctx.save();ctx.globalAlpha=1;ctx.globalCompositeOperation="source-over";ctx.filter='hue-rotate(300deg) saturate(1.3)';ctx.drawImage(facImg,ex-fw/2,ey-fh/2,fw,fh);ctx.filter='none';ctx.restore();}}
  for(const wr of wrecks){const[x,y]=w2s(wr.x,wr.y);
    ctx.globalAlpha=Math.min(1,wr.fade)*0.3;ctx.fillStyle='#1a160f';ctx.beginPath();ctx.ellipse(x,y,HULL_W*SCALE*z*0.45,HULL_H*SCALE*z*0.4,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    if(wr.unitType==='soldier'){
      // ASKER ENKAZI: yere düşmüş asker görseli
      const deathFrames=sldImgs.death;
      if(deathFrames&&deathFrames.length>0){
        const img=deathFrames[deathFrames.length-1]; // son ölme karesi (yerde yatan)
        if(img&&img.complete){
          const sw=img.width*SCALE*1.7*z, sh=img.height*SCALE*1.7*z;
          ctx.save();ctx.globalAlpha=Math.min(1,wr.fade);
          ctx.drawImage(img,x-sw/2,y-sh/2,sw,sh);
          ctx.restore();
        }
      }
    } else if(wr.unitType==='heli'){
      // HELİKOPTER ENKAZI: kararmış gövde, yerde (gölge yok, düşmüş)
      const hw=HELI_W*SCALE*0.9*z,hh=HELI_H*SCALE*0.9*z;
      ctx.save();ctx.globalAlpha=Math.min(1,wr.fade);ctx.translate(x,y);ctx.rotate(wr.a+Math.PI/2);
      ctx.filter='brightness(0.3) saturate(0.4)';
      if(heliImg.complete)ctx.drawImage(heliImg,-hw/2,-hh/2,hw,hh);
      ctx.filter='none';ctx.restore();
    } else {
      drawHullTurret(x,y,wr.a,wr.a,{dark:true,alpha:Math.min(1,wr.fade),team:wr.team});
    }}
  for(const w of waves){const[x,y]=w2s(w.x,w.y);ctx.strokeStyle=`rgba(120,160,90,${w.life})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,w.r*z,0,Math.PI*2);ctx.stroke();}
  for(const t of tanks){if(t.selected&&t.alive){const[x,y]=w2s(t.x,t.y);ctx.strokeStyle='rgba(120,160,90,0.08)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,STATS.range*z,0,Math.PI*2);ctx.stroke();}}
  // PERFORMANS: ekran disindaki birimleri eleme (culling)
  const cullL=cam.x-150, cullR=cam.x+VW/cam.zoom+150, cullT=cam.y-150, cullB=cam.y+VH/cam.zoom+150;
  const onScreen=t=>t.x>=cullL&&t.x<=cullR&&t.y>=cullT&&t.y<=cullB;
  // önce YER birimleri (tank), y-sort
  const ground=tanks.filter(t=>t.alive&&t.unitType!=='heli'&&onScreen(t)).slice().sort((a,b)=>a.y-b.y);
  for(const t of ground)drawTankWorld(t);
  // sonra HAVA birimleri (helikopter) - her zaman üstte, y-sort
  const air=tanks.filter(t=>t.alive&&t.unitType==='heli'&&onScreen(t)).slice().sort((a,b)=>a.y-b.y);
  for(const t of air)drawTankWorld(t);
  ctx.globalCompositeOperation='lighter';
  for(const b of bullets){const[x,y]=w2s(b.x,b.y);
    const sp=Math.hypot(b.vx,b.vy)||1;const ux=b.vx/sp,uy=b.vy/sp; // yön
    if(b.kind==='rocket'){ // ROKET: turuncu alev izli füze
      if(time%2===0)smoke(b.x,b.y,false);
      const tl=22*z; // alev izi uzunluğu
      const g=ctx.createLinearGradient(x,y,x-ux*tl,y-uy*tl);
      g.addColorStop(0,'rgba(255,240,180,0.9)');g.addColorStop(0.4,'rgba(255,140,40,0.6)');g.addColorStop(1,'rgba(255,80,20,0)');
      ctx.strokeStyle=g;ctx.lineWidth=5*z;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-ux*tl,y-uy*tl);ctx.stroke();
      ctx.fillStyle='#fff8e0';ctx.beginPath();ctx.arc(x,y,3.5*z,0,Math.PI*2);ctx.fill();
    } else { // TANK & MAKİNELİ: parlayan tracer (izli mermi)
      const big=b.kind!=='mg';
      // her silaha ozgu iz: 25mm buyuk turuncu, 50cal sari, mg kucuk, tank yesil/turuncu
      let tl, core, col;
      if(b.kind==='50cal'){ tl=26*z; core=2.6*z; col=[255,235,90]; }       // Stryker .50cal: parlak SARI
      else if(b.kind==='25mm'){ tl=30*z; core=3.4*z; col=[255,150,40]; }   // Bradley 25mm: buyuk TURUNCU
      else if(big){ tl=18*z; core=3*z; col=b.team==='player'?[180,255,140]:[255,180,90]; } // tank
      else { tl=11*z; core=2*z; col=b.team==='player'?[170,255,150]:[255,170,80]; }       // makineli (mg)
      // ışıklı iz (tracer)
      const g=ctx.createLinearGradient(x,y,x-ux*tl,y-uy*tl);
      g.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},0.85)`);g.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.strokeStyle=g;ctx.lineWidth=core*1.3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-ux*tl,y-uy*tl);ctx.stroke();
      // parlak çekirdek + glow
      const gg=ctx.createRadialGradient(x,y,0,x,y,core*2.2);
      gg.addColorStop(0,'#ffffff');gg.addColorStop(0.5,`rgba(${col[0]},${col[1]},${col[2]},0.9)`);gg.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.fillStyle=gg;ctx.beginPath();ctx.arc(x,y,core*2.2,0,Math.PI*2);ctx.fill();
    }}
  ctx.globalCompositeOperation='source-over';
  for(const s of smokes){const[x,y]=w2s(s.x,s.y);ctx.globalAlpha=s.life*0.4;ctx.fillStyle='#3a3a3a';ctx.beginPath();ctx.arc(x,y,s.r*z,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  for(const p of particles){const[x,y]=w2s(p.x,p.y);ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(x-p.size/2*z,y-p.size/2*z,p.size*z,p.size*z);}
  // NAMLU ATEŞİ (parlak, additive - ışık gibi)
  ctx.globalCompositeOperation='lighter';
  for(const f of flashParts){const[x,y]=w2s(f.x,f.y);ctx.globalAlpha=Math.min(1,f.life);
    if(f.type==='flash'){
      const g=ctx.createRadialGradient(x,y,0,x,y,f.size*z);
      g.addColorStop(0,'#fffff0');g.addColorStop(0.4,f.color);g.addColorStop(1,'rgba(255,120,20,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,f.size*z,0,Math.PI*2);ctx.fill();
    } else { // spark
      ctx.fillStyle=f.color;ctx.beginPath();ctx.arc(x,y,f.size*0.5*z,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;ctx.restore();
  if(selBox&&didDrag){const x=Math.min(selBox.x0,selBox.x1),y=Math.min(selBox.y0,selBox.y1),w=Math.abs(selBox.x1-selBox.x0),h=Math.abs(selBox.y1-selBox.y0);ctx.strokeStyle='#7fff9f';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);ctx.fillStyle='rgba(127,255,159,0.08)';ctx.fillRect(x,y,w,h);}
  drawMinimap();
}

// === MİNİ HARİTA (sağ üst) ===
let minimapRect={mx:0,my:0,mw:0,mh:0};
function drawMinimap(){
  const mw=150, mh=mw*MAP_H/MAP_W;
  const mx=VW-mw-8, my=70; // HUD'un altına
  minimapRect={mx,my,mw,mh}; // tiklama icin sakla
  // arka plan
  ctx.fillStyle='rgba(20,28,18,0.8)';ctx.fillRect(mx-3,my-3,mw+6,mh+6);
  // ADA terrain (su mavi, kara yesil, kum, dag)
  const cw=mw/ISLAND_GW, ch=mh/ISLAND_GH;
  for(let gy=0;gy<ISLAND_GH;gy++){
    for(let gx=0;gx<ISLAND_GW;gx++){
      const t=D_GRID[gy*ISLAND_GW+gx]===2?0:1;
      ctx.fillStyle=t===0?'#1d3a4a':t===2?'#9a8862':t===3?'#6b6358':'#5a7048';
      ctx.fillRect(mx+gx*cw,my+gy*ch,cw+0.5,ch+0.5);
    }
  }
  const sx=mw/MAP_W, sy=mh/MAP_H;
  // kışlalar
  ctx.fillStyle='#5cff7a';ctx.fillRect(mx+factory.x*sx-3,my+factory.y*sy-3,6,6);
  ctx.fillStyle='#ff5c5c';ctx.fillRect(mx+enemyFactory.x*sx-3,my+enemyFactory.y*sy-3,6,6);
  // engeller (minimap)
  for(const o of obstacles){
    ctx.fillStyle=o.type==='rock'?'rgba(120,115,105,0.8)':'rgba(50,110,50,0.8)';
    const rr=Math.max(1,o.r*sx);
    ctx.beginPath();ctx.arc(mx+o.x*sx,my+o.y*sy,rr,0,Math.PI*2);ctx.fill();
  }
  // birimler
  for(const t of tanks){if(!t.alive)continue;ctx.fillStyle=t.team==='player'?'#5cff7a':'#ff5c5c';ctx.fillRect(mx+t.x*sx-1.5,my+t.y*sy-1.5,3,3);}
  // kamera görüş alanı çerçevesi
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;
  ctx.strokeRect(mx+cam.x*sx,my+cam.y*sy,(VW/cam.zoom)*sx,(VH/cam.zoom)*sy);
}
// Minimap'e dokunma kontrolu - verilen ekran noktasi minimap icinde mi?
function minimapHit(px,py){
  const r=minimapRect;
  return px>=r.mx&&px<=r.mx+r.mw&&py>=r.my&&py<=r.my+r.mh;
}
// Minimap noktasini dunya koordinatina cevir ve kamerayi oraya tasi
function minimapJump(px,py){
  const r=minimapRect;
  const wx=(px-r.mx)/r.mw*MAP_W, wy=(py-r.my)/r.mh*MAP_H;
  cam.x=wx-VW/cam.zoom/2; cam.y=wy-VH/cam.zoom/2; clampCam();
}
setup();
let lastTime=0;
const TARGET_FPS=60;
const FRAME_MS=1000/TARGET_FPS;
let accumulator=0;
function loop(ts){
  if(lastTime===0)lastTime=ts;
  const raw=ts-lastTime;lastTime=ts;
  const dt=Math.min(raw,50); // max 50ms (tab gizliyken spike engelle)
  accumulator+=dt;
  // PERFORMANS: maksimum 2 update per frame (spiral of death engeli)
  let steps=0;
  while(accumulator>=FRAME_MS&&steps<2){update();accumulator-=FRAME_MS;steps++;}
  if(accumulator>=FRAME_MS)accumulator=0; // birikimi sıfırla
  if(steps>0)draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
